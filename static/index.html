<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella Tavola — Restaurant Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F0E3;
    --rust: #B85C38;
    --dark: #1C1410;
    --charcoal: #2A1F1A;
    --muted: #8A7A68;
    --gold: #C8943A;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .chat-container {
    width: 100%;
    max-width: 680px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(28,20,16,0.18);
    display: flex;
    flex-direction: column;
    height: 92vh;
    max-height: 780px;
  }
  .header {
    background: var(--charcoal);
    color: var(--cream);
    padding: 22px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .header-logo {
    width: 46px; height: 46px;
    background: var(--rust);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
  }
  .header-info h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 600;
  }
  .header-info p {
    font-size: 0.75rem;
    opacity: 0.5;
    margin-top: 2px;
  }
  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    opacity: 0.7;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: #4CAF50;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    display: flex;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .bot .avatar { background: var(--charcoal); }
  .user .avatar { background: var(--rust); }
  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .bot .bubble {
    background: white;
    color: var(--dark);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .user .bubble {
    background: var(--rust);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: white;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }
  .quick-replies {
    padding: 10px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    background: var(--cream);
    flex-shrink: 0;
  }
  .quick-reply {
    white-space: nowrap;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--rust);
    background: transparent;
    color: var(--rust);
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .quick-reply:hover {
    background: var(--rust);
    color: white;
  }
  .input-area {
    padding: 16px 20px;
    background: white;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 1px solid rgba(0,0,0,0.06);
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    padding: 12px 16px;
    border: 1.5px solid var(--warm, #EDE0C8);
    border-radius: 12px;
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    background: var(--cream);
    transition: border 0.2s;
  }
  .input-area input:focus { border-color: var(--rust); }
  .send-btn {
    width: 44px; height: 44px;
    background: var(--rust);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #a04d2e; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
  .powered {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    padding: 8px;
    background: var(--cream);
  }
  .powered a { color: var(--rust); text-decoration: none; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="header">
    <div class="header-logo">🍽️</div>
    <div class="header-info">
      <h1>Bella Tavola</h1>
      <p>AI Restaurant Assistant</p>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-replies" id="quickReplies">
    <button class="quick-reply" onclick="sendQuick('Show me the menu')">🍽️ View Menu</button>
    <button class="quick-reply" onclick="sendQuick('I want to make a reservation')">📅 Reservation</button>
    <button class="quick-reply" onclick="sendQuick('I want to place an order')">🛒 Order Food</button>
    <button class="quick-reply" onclick="sendQuick('What are your opening hours?')">🕐 Hours</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKey(event)" />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="powered">
    Powered by <a href="https://hub105.github.io/atlasautomations.github.io" target="_blank">Atlas Automations</a>
  </div>
</div>

<script>
  const messages = [];

  window.onload = () => {
    addMessage('bot', "Welcome to Bella Tavola! 🍽️ I'm Sofia, your personal dining assistant. I can help you explore our menu, make a reservation, or place an order. How may I assist you today?");
  };

  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'bot' ? '👩‍🍳' : '👤'}</div>
      <div class="bubble">${text}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">👩‍🍳</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    addMessage('user', text);
    messages.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      removeTyping();
      addMessage('bot', data.reply);
      messages.push({ role: 'assistant', content: data.reply });
    } catch (err) {
      removeTyping();
      addMessage('bot', 'Sorry, something went wrong. Please try again.');
    }
  }

  function sendQuick(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter') sendMessage();
  }
</script>
</body>
  </html>
